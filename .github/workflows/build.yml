name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          cmdline-tools/latest/bin/sdkmanager "platforms;android-31" "build-tools;31.0.0"
      
      - name: Install Python deps
        run: pip install buildozer kivy cython pillow
      
      - name: Build APK
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk
        run: |
          buildozer android debug
        timeout-minutes: 60
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk
          path: bin/*.apk
