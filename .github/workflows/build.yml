name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download Android SDK
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          cd ~/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          echo "y" | latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
      
      - name: Install Python deps
        run: pip install buildozer==1.5.0 kivy cython pillow
      
      - name: Build APK
        env:
          ANDROID_HOME: ~/android-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          buildozer android debug
        timeout-minutes: 90
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: seopublish.apk
          path: bin/*.apk
